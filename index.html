<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HeroKit — Hero Background Generator</title>
    <!-- Favicon: light logo on dark browser chrome, dark logo on light browser chrome -->
    <link rel="icon" type="image/png" href="/herokit_logomark_light.png" media="(prefers-color-scheme: dark)">
    <link rel="icon" type="image/png" href="/herokit_logomark_dark.png" media="(prefers-color-scheme: light)">
    <link rel="apple-touch-icon" href="/herokit_logomark_light.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              gray: { 850: '#1f2937', 900: '#111827', 950: '#030712' }
            }
          },
        },
      }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet" crossorigin="anonymous">

    <!-- Phosphor Icons -->
    <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" crossorigin="anonymous">
    <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/bold/style.css" crossorigin="anonymous">
    <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css" crossorigin="anonymous">

    <style>
      * { box-sizing: border-box; }
      body { font-family: 'Inter', sans-serif; }

      /* Custom scrollbar — hidden by default */
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

      /* Range slider */
      .heroken-slider {
        -webkit-appearance: none;
        appearance: none;
        width: 100%;
        height: 2px;
        background: #2a2a2a;
        border-radius: 2px;
        outline: none;
        cursor: pointer;
      }
      .heroken-slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 11px;
        height: 11px;
        background: #ffffff;
        border-radius: 50%;
        cursor: pointer;
        transition: transform 0.1s;
      }
      .heroken-slider::-webkit-slider-thumb:hover { transform: scale(1.3); }
      .heroken-slider::-moz-range-thumb {
        width: 11px;
        height: 11px;
        background: #ffffff;
        border: none;
        border-radius: 50%;
        cursor: pointer;
      }
    </style>

  </head>
  <body class="bg-[#111] text-white antialiased h-screen overflow-hidden">
    <div id="root" class="h-full"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
