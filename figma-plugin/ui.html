<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Inter, -apple-system, sans-serif; background: #1a1a1a; color: #fff; padding: 20px; }
  h1 { font-size: 15px; font-weight: 600; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
  .logo { width: 20px; height: 20px; }
  p  { font-size: 11px; color: #888; line-height: 1.5; margin-bottom: 16px; }
  .steps { background: #111; border: 1px solid #2a2a2a; border-radius: 10px; padding: 14px; margin-bottom: 16px; }
  .step { font-size: 11px; color: #777; padding: 4px 0; display: flex; gap: 10px; }
  .step span:first-child { color: #555; font-size: 10px; width: 16px; text-align: center; flex-shrink: 0; }
  .step b { color: #ccc; }
  .btn { width: 100%; padding: 11px; border-radius: 8px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
  .btn-primary { background: #fff; color: #000; }
  .btn-primary:hover { background: #eee; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-secondary { background: transparent; color: #555; border: 1px solid #2a2a2a; margin-top: 8px; font-size: 11px; }
  .btn-secondary:hover { color: #999; border-color: #444; }
  .status { font-size: 11px; color: #22c55e; text-align: center; margin-top: 10px; min-height: 16px; }
  .error { color: #f87171; }
</style>
</head>
<body>
<h1>⊙ HeroKit</h1>
<p>Export from HeroKit then paste directly into your Figma file.</p>

<div class="steps">
  <div class="step"><span>1</span><span>In HeroKit, click <b>Copy PNG — for Figma plugin</b></span></div>
  <div class="step"><span>2</span><span>Optional: select an existing frame or rectangle to fill</span></div>
  <div class="step"><span>3</span><span>Click <b>Paste from Clipboard</b> below</span></div>
</div>

<button class="btn btn-primary" id="pasteBtn" onclick="pasteFromClipboard()">
  Paste from Clipboard
</button>
<button class="btn btn-secondary" onclick="cancel()">Cancel</button>
<div class="status" id="status"></div>

<script>
  const status = document.getElementById('status');
  const btn    = document.getElementById('pasteBtn');

  async function pasteFromClipboard() {
    btn.disabled = true;
    status.textContent = 'Reading clipboard…';
    status.className = 'status';

    try {
      const items = await navigator.clipboard.read();
      for (const item of items) {
        if (item.types.includes('image/png')) {
          const blob        = await item.getType('image/png');
          const arrayBuffer = await blob.arrayBuffer();
          const bytes       = Array.from(new Uint8Array(arrayBuffer));

          // Try to read natural dimensions from the blob
          const img = new Image();
          const url = URL.createObjectURL(blob);
          await new Promise(r => { img.onload = r; img.onerror = r; img.src = url; });
          URL.revokeObjectURL(url);

          parent.postMessage({
            pluginMessage: {
              type:   'insert-image',
              bytes,
              width:  img.naturalWidth  || 1920,
              height: img.naturalHeight || 1080,
            }
          }, '*');

          status.textContent = '✓ Inserting…';
          return;
        }
      }
      throw new Error('No PNG image found in clipboard');
    } catch (e) {
      status.className  = 'status error';
      status.textContent = e.message || 'Clipboard access denied. Copy PNG from HeroKit first.';
      btn.disabled = false;
    }
  }

  function cancel() {
    parent.postMessage({ pluginMessage: { type: 'cancel' } }, '*');
  }
</script>
</body>
</html>
